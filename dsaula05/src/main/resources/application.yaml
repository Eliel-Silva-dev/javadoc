spring:
  application:
    name: dsaula05
  datasource:
    url: jdbc:h2:mem:dsaula05;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-plataform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
logging:
  level:
    root: WARN
    com.hydrahtec.dsaula05: DEBUG
    #org.springframework.web: DEBUG
